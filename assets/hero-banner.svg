  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="45%" stop-color="#1a0030"/>
      <stop offset="72%" stop-color="#660066"/>
      <stop offset="100%" stop-color="#ff00c8"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2fb"/>
      <stop offset="20%" stop-color="#ff00c8"/>
      <stop offset="100%" stop-color="#00fff9"/>
    </linearGradient>
    <linearGradient id="floorFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0030" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0014" stop-opacity="0.95"/>
    </linearGradient>
    <clipPath id="aboveHorizon">
      <rect x="0" y="0" width="1200" height="190"/>
    </clipPath>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="300" fill="url(#sky)"/>

  <g clip-path="url(#aboveHorizon)">
    <circle cx="600" cy="190" r="68" fill="url(#sunGrad)" filter="url(#glow)" opacity="0.7">
